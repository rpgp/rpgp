name: CI

on:
  pull_request:
  push:
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_BACKTRACE: 1
  RUSTFLAGS: -Dwarnings
  RUST_NIGHTLY: nightly-2025-04-02

jobs:
  build_and_test_nix:
    name: Build and test (Nix)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: 
          #- ubuntu-latest
          - macOS-latest
        rust:
          - nightly-2025-04-02
          - stable

    steps:
    - name: Checkout
      uses: actions/checkout@master
      with:
        submodules: recursive

    - name: Checkout submodules
      run: git submodule update --checkout

    - name: Install ${{ matrix.rust }}
      uses: actions-rs/toolchain@v1
      with:
        toolchain: ${{ matrix.rust }}
        override: true

    - name: Install cargo-nextest
      uses: taiki-e/install-action@v2
      with:
        tool: nextest@0.9.137

    - name: tests
      if: false
      run: cargo nextest run --lib --bins --tests --all

    - name: doc tests
      if: false
      run: cargo test --doc

    - name: test crypto::dsa::tests::test_dsa_2048 500 times
      run: cargo nextest run --lib --bins --tests --all --features asm --stress-count 500 crypto::dsa::tests::test_dsa_2048

    - name: asm
      if: ${{ matrix.rust == env.RUST_NIGHTLY }}
      run: cargo nextest run --lib --bins --tests --all --features asm -- dsa
